# 全局配置
user  root;                 # 运行 Nginx 的用户
worker_processes auto;       # 自动根据 CPU 核心数设置进程数
pid /var/run/nginx.pid;      # PID 文件路径
error_log /opt/project/log/nginx/error.log warn;  # 错误日志

events {
    worker_connections 10240;   # 单进程最大连接数，生产建议 >= 4096
    multi_accept on;            # 单次尽可能多接收新连接
    use epoll;                  # Linux 高性能事件模型
}

http {
    ##
    # 基本设置
    ##
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;              # 启用 sendfile，减少上下文切换
    tcp_nopush      on;              # 优化 TCP 包传输
    tcp_nodelay     on;              # 减少延迟

    keepalive_timeout  65;           # 长连接超时时间
    types_hash_max_size 4096;        # 类型哈希表大小
    server_tokens off;               # 隐藏 Nginx 版本号，提升安全性

    ##
    # 日志设置
    ##
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /opt/project/log/nginx/access.log  main;

    ##
    # Gzip 压缩
    ##
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;                # 压缩级别：1-9，推荐 4-6
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_disable "msie6";

    ##
    # 缓存 & 文件优化
    ##
    open_file_cache max=20000 inactive=60s;
    open_file_cache_valid 120s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    ##
    # 虚拟主机配置
    ##
    include /opt/project/run/nginx/conf.d/*.conf;   # 通用 vhost 配置（推荐在 conf.d 下放置 *.conf）
    include /opt/project/run/nginx/sites-enabled/*; # 兼容 sites-enabled 方式
}
